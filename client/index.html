<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Gestura</title>
    <style>
      :root {
        --bg0: #070a10;
        --bg1: #0b1020;
        --ink: #eaf2ff;
        --muted: rgba(234, 242, 255, 0.72);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #a78bfa;
        --good: #2dd4bf;
        --radius: 18px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial;
        color: var(--ink);
        background:
          radial-gradient(
            1200px 700px at 50% 25%,
            rgba(167, 139, 250, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px 600px at 50% 70%,
            rgba(45, 212, 191, 0.12),
            transparent 55%
          ),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        display: grid;
        place-items: center;
        min-height: 100%;
        padding: 18px;
      }
      .panel {
        width: min(400px, 100%);
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        backdrop-filter: blur(10px);
        padding: 28px 24px;
        display: grid;
        gap: 16px;
      }
      .logo {
        text-align: center;
      }
      .logo h1 {
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #a78bfa, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .logo p {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      input {
        width: 100%;
        padding: 12px 14px;
        font-size: 16px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
        outline: none;
      }
      input:focus {
        border-color: rgba(167, 139, 250, 0.55);
        box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.18);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--line);
      }
      button {
        width: 100%;
        padding: 13px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
        cursor: pointer;
      }
      button:active {
        transform: scale(0.98);
      }
      .btn-create {
        background: rgba(45, 212, 191, 0.14);
        border-color: rgba(45, 212, 191, 0.35);
      }
      .btn-join {
        background: rgba(167, 139, 250, 0.14);
        border-color: rgba(167, 139, 250, 0.35);
      }
      .code-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }
      .code-row button {
        width: auto;
        padding: 13px 20px;
      }
      .hint {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      .hint.error {
        color: #fb7185;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="logo">
        <h1>GESTURA</h1>
        <p>Draw spells. Eliminate everyone. Last one standing wins.</p>
      </div>
      <label>
        Your name
        <input
          id="nameInput"
          maxlength="8"
          autocomplete="off"
          placeholder="Enter your name"
        />
      </label>
      <button class="btn-create" id="createBtn">✦ Create Game</button>
      <div class="divider">or join existing</div>
      <div class="code-row">
        <label>
          Room code
          <input
            id="codeInput"
            maxlength="4"
            placeholder="ABCD"
            autocomplete="off"
            style="
              text-transform: uppercase;
              letter-spacing: 4px;
              font-weight: 700;
            "
          />
        </label>
        <button class="btn-join" id="joinBtn">Join</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
    <script>
      const nameInput = document.getElementById('nameInput')
      const codeInput = document.getElementById('codeInput')
      const hint = document.getElementById('hint')
      nameInput.value = sessionStorage.getItem('gestura_name') || ''
      const urlParams = new URLSearchParams(window.location.search)
      if (urlParams.get('error') === 'name_taken') {
        showError(
          'That name is already taken in this room. Choose a different name.'
        )
      }
      codeInput.addEventListener('input', () => {
        codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z]/g, '')
      })
      function getName() {
        return nameInput.value.trim().slice(0, 8)
      }
      function showError(msg) {
        hint.textContent = msg
        hint.className = 'hint error'
      }
      document.getElementById('createBtn').addEventListener('click', () => {
        const name = getName()
        if (!name) {
          showError('Enter your name first.')
          return
        }
        sessionStorage.setItem('gestura_name', name)
        window.location.href = `game.html?name=${encodeURIComponent(name)}&create=1`
      })
      document.getElementById('joinBtn').addEventListener('click', () => {
        const name = getName()
        const code = codeInput.value.trim().toUpperCase()
        if (!name) {
          showError('Enter your name first.')
          return
        }
        if (code.length !== 4) {
          showError('Enter a 4-letter room code.')
          return
        }
        sessionStorage.setItem('gestura_name', name)
        window.location.href = `game.html?name=${encodeURIComponent(name)}&room=${code}`
      })
      codeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('joinBtn').click()
      })
      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('createBtn').click()
      })
    </script>
  </body>
</html>
